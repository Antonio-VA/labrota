<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="darkBlue2" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#2d6fa8"/>
      <stop offset="100%" stop-color="#1a4a72"/>
    </radialGradient>
    <radialGradient id="lightBlue2" cx="45%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#9ecfea"/>
      <stop offset="100%" stop-color="#6ab4d8"/>
    </radialGradient>
  </defs>

  <!-- Transparent background — no rect -->

  <!-- Dark navy circle — top left -->
  <circle cx="200" cy="200" r="148" fill="url(#darkBlue2)"/>

  <!-- Light blue circle — bottom right -->
  <circle cx="312" cy="312" r="148" fill="url(#lightBlue2)" opacity="0.85"/>

  <!-- Overlap blend highlight -->
