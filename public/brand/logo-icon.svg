<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="darkCircle" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#5a9fd4"/>
      <stop offset="100%" stop-color="#3a7ab5"/>
    </radialGradient>
    <radialGradient id="lightCircle" cx="45%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#c8e8f5"/>
      <stop offset="100%" stop-color="#a0d0ea"/>
    </radialGradient>
  </defs>

  <!-- Dark navy rounded square background -->
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="#1a4a72"/>

  <!-- Dark circle — top left -->
  <circle cx="196" cy="196" r="148" fill="url(#darkCircle)"/>

  <!-- Light circle — bottom right -->
  <circle cx="316" cy="316" r="148" fill="url(#lightCircle)" opacity="0.85"/>

  <!-- Overlap highlight -->
  <circle cx="316" cy="316" r="148" fill="#c8e8f5" opacity="0.2"/>
</svg>
