<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgSister" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563a8"/>
      <stop offset="100%" stop-color="#1a4a72"/>
    </linearGradient>
    <linearGradient id="figureGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#d0e8f8" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- Background — same rounded square as original -->
  <rect width="512" height="512" rx="96" fill="url(#bgSister)"/>

  <!-- ── Figure ─────────────────────────────────────── -->

  <!-- Head -->
  <circle cx="256" cy="158" r="72" fill="url(#figureGrad)"/>

  <!-- Body — smooth, upright silhouette -->
  <path d="
    M 197 228
    C 178 246 164 272 158 302
    C 148 346 154 392 172 422
    C 188 450 220 464 256 464
    C 292 464 324 450 340 422
    C 358 392 364 346 354 302
    C 348 272 334 246 315 228
    C 296 248 278 256 256 256
    C 234 256 216 248 197 228 Z
  " fill="url(#figureGrad)"/>

  <!-- Left arm — flowing outward and slightly up -->
  <path d="
    M 195 268
    C 175 258 148 252 122 258
    C 100 263 86 278 90 296
    C 94 312 112 320 132 316
    C 152 312 168 296 185 280
  " fill="url(#figureGrad)" opacity="0.85"/>

  <!-- Right arm — mirrored -->
  <path d="
    M 317 268
    C 337 258 364 252 390 258
    C 412 263 426 278 422 296
    C 418 312 400 320 380 316
    C 360 312 344 296 327 280
  " fill="url(#figureGrad)" opacity="0.85"/>

  <!-- Small accent circle — subtle embryo/cell motif -->
  <circle cx="338" cy="148" r="22" fill="white" opacity="0.28"/>
  <circle cx="338" cy="148" r="12" fill="white" opacity="0.45"/>
</svg>
