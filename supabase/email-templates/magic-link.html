<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso a LabRota</title>
</head>
<body style="margin:0;padding:0;background-color:#F4F7FA;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;">

  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#F4F7FA;padding:40px 16px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;">

          <!-- Wordmark -->
          <tr>
            <td align="center" style="padding-bottom:24px;">
              <span style="font-size:28px;line-height:1;color:#1B4F8A;font-weight:300;letter-spacing:-0.5px;">lab</span><span style="font-size:28px;line-height:1;color:#1B4F8A;font-weight:700;letter-spacing:-0.5px;">rota</span>
              <div style="margin-top:6px;height:2px;background-color:#2E86AB;width:100%;max-width:480px;"></div>
            </td>
          </tr>

          <!-- Card -->
          <tr>
            <td style="background-color:#FFFFFF;border-radius:12px;border:1px solid #CCDDEE;padding:40px 36px;">
              <table width="100%" cellpadding="0" cellspacing="0">

                <!-- Heading -->
                <tr>
                  <td style="padding-bottom:12px;">
                    <p style="margin:0;font-size:18px;font-weight:500;color:#1A2E3B;">Tu código de acceso</p>
                  </td>
                </tr>

                <!-- Body -->
                <tr>
                  <td style="padding-bottom:32px;">
                    <p style="margin:0;font-size:14px;color:#64748B;line-height:1.6;">
                      Introduce este código en la página de inicio de sesión. Válido durante 1 hora, un solo uso.
                    </p>
                  </td>
                </tr>

                <!-- OTP Code -->
                <tr>
                  <td align="center" style="padding-bottom:32px;">
                    <div style="background-color:#F4F7FA;border:1px solid #CCDDEE;border-radius:8px;padding:16px 24px;display:inline-block;">
                      <span style="font-size:32px;font-weight:600;letter-spacing:0.3em;color:#1A2E3B;font-family:'Courier New',monospace;">{{ .Token }}</span>
                    </div>
                  </td>
                </tr>

              </table>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td align="center" style="padding-top:24px;">
              <p style="margin:0;font-size:12px;color:#94A3B8;">
                Si no solicitaste este acceso, puedes ignorar este mensaje.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
